<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: Arial, sans-serif;
      }
      main {
        width: min(560px, calc(100% - 32px));
        border: 1px solid #334155;
        border-radius: 12px;
        background: #111827;
        padding: 24px;
      }
      h1 { margin: 0 0 8px; font-size: 22px; }
      p { margin: 0; line-height: 1.5; color: #94a3b8; }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>The app could not load this page without a network connection. Reconnect and refresh.</p>
    </main>
  </body>
</html>
